name: riseup
description: RiseUP — a daily Stoic practice app. Lessons, quotes, streaks, and a paywall that doesn't beg.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------- Data backends ----------
  # PocketBase: static content (lessons, quotes, authors, plans)
  pocketbase: ^0.18.0
  http: ^1.2.2
  # Appwrite: user data (auth, progress, favorites, subscriptions, settings)
  appwrite: ^14.0.0

  # ---------- State management ----------
  flutter_riverpod: ^2.5.1

  # ---------- Routing ----------
  go_router: ^14.2.0

  # ---------- UI ----------
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ---------- Storage ----------
  shared_preferences: ^2.2.3
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # ---------- Audio (Year 2 — included now so deps don't churn) ----------
  just_audio: ^0.9.40
  audio_session: ^0.1.21

  # ---------- Utilities ----------
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.1.2
  sentry_flutter: ^8.5.0

  # ---------- Daily reminder (local scheduling; FCM-ready) ----------
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Build tooling
  build_runner: ^2.4.13
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/splash/
    - assets/onboarding/

flutter_native_splash:
  color: "#FAF6EF"
  image: assets/splash/splash.png
  image_dark: assets/splash/splash.png
  android_12:
    color: "#FAF6EF"
    image_dark: assets/splash/splash.png
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icons/icon.png"
  image_path_ios: "assets/icons/icon.png"
  adaptive_icon_background: "#FAF6EF"
  adaptive_icon_foreground: "assets/icons/icon.png"
  # Remove alpha channel for iOS app store submission
  remove_alpha_ios: true