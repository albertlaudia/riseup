name: riseup
description: RiseUP — a daily Stoic practice app. Lessons, quotes, streaks, and a paywall that doesn't beg.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------- Data backends ----------
  # PocketBase: static content (lessons, quotes, authors, plans)
  pocketbase: ^0.18.0
  http: ^1.2.2
  # Appwrite: user data (auth, progress, favorites, subscriptions, settings)
  appwrite: ^14.0.0

  # ---------- State management ----------
  flutter_riverpod: ^2.5.1

  # ---------- Routing ----------
  go_router: ^14.2.0

  # ---------- UI ----------
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ---------- Storage ----------
  shared_preferences: ^2.2.3

  # ---------- Utilities ----------
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
